<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIT P-REV - Kuasai Ayat Pasif</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Color Codes */
        .kod-subjek { background-color: #3b82f6; color: white; } /* Biru */
        .kod-katakerja { background-color: #22c55e; color: white; } /* Hijau */
        .kod-objek { background-color: #fbbf24; color: black; } /* Kuning */
        .kod-keterangan { background-color: #a855f7; color: white; } /* Ungu */

        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .word-tile {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .word-tile:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Certificate Print styling */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col">

    <!-- Navbar -->
    <nav class="bg-green-600 text-white p-4 shadow-md flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-graduation-cap text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">KIT P-REV</h1>
        </div>
        <div id="user-info" class="hidden font-medium bg-green-700 px-4 py-1 rounded-full">
            <i class="fa-solid fa-user mr-2"></i><span id="display-name"></span>
            <button onclick="app.logout()" class="ml-3 text-red-300 hover:text-red-100"><i class="fa-solid fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-1 overflow-y-auto p-4 md:p-8 relative">
        <!-- Screens will be injected here by JS -->
    </main>

    <script>
        /**
         * PENTING: GOOGLE SHEETS SETUP
         * Sila gantikan nilai di bawah dengan Web App URL Google Apps Script anda.
         */
        const GOOGLE_SHEETS_URL = ""; 
        const apiKey = ""; // Disediakan oleh environment untuk Gemini API

        // --- GAME DATA & CONTENT ---
        const notaSlides = [
            { title: "Apa itu Ayat Aktif?", content: "Ayat yang menekankan <b>Pembuat</b> (Subjek).<br><br>Contoh: <i>Saya membaca buku itu.</i>", icon: "fa-bolt" },
            { title: "Apa itu Ayat Pasif?", content: "Ayat yang menekankan <b>Benda yang kena buat</b> (Objek).<br><br>Contoh: <i>Buku itu saya baca.</i>", icon: "fa-exchange-alt" },
            { title: "Kod Warna Kita!", content: "<div class='flex flex-wrap gap-2 justify-center'><span class='kod-subjek px-3 py-1 rounded'>Subjek (Biru)</span><span class='kod-katakerja px-3 py-1 rounded'>Kata Kerja (Hijau)</span><span class='kod-objek px-3 py-1 rounded'>Objek (Kuning)</span><span class='kod-keterangan px-3 py-1 rounded'>Keterangan (Ungu)</span></div>", icon: "fa-palette" }
        ];

        const questions = [
            // ARAS RENDAH (KGND 1 & 2 - Formula OBKK)
            { level: 1, type: "OBKK", aktif: "Saya menyapu sampah itu sebentar tadi.",
              words: [
                  {text: "Saya", kod: "kod-subjek"}, {text: "sapu", kod: "kod-katakerja"}, 
                  {text: "sampah itu", kod: "kod-objek"}, {text: "sebentar tadi.", kod: "kod-keterangan"}
              ],
              target: ["sampah itu", "Saya", "sapu", "sebentar tadi."] },
            { level: 1, type: "OBKK", aktif: "Kami membersihkan kelas ini setiap pagi.",
              words: [
                  {text: "Kami", kod: "kod-subjek"}, {text: "bersihkan", kod: "kod-katakerja"}, 
                  {text: "kelas ini", kod: "kod-objek"}, {text: "setiap pagi.", kod: "kod-keterangan"}
              ],
              target: ["kelas ini", "Kami", "bersihkan", "setiap pagi."] },
            
            // ARAS SEDERHANA (KGND 3 - Formula OKSK)
            { level: 2, type: "OKSK", aktif: "Ali menendang bola itu di padang.",
              words: [
                  {text: "Ali", kod: "kod-subjek"}, {text: "ditendang oleh", kod: "kod-katakerja"}, 
                  {text: "bola itu", kod: "kod-objek"}, {text: "di padang.", kod: "kod-keterangan"}
              ],
              target: ["bola itu", "ditendang oleh", "Ali", "di padang."] },
            { level: 2, type: "OKSK", aktif: "Kucing itu mengejar tikus di dapur.",
              words: [
                  {text: "Kucing itu", kod: "kod-subjek"}, {text: "dikejar oleh", kod: "kod-katakerja"}, 
                  {text: "tikus", kod: "kod-objek"}, {text: "di dapur.", kod: "kod-keterangan"}
              ],
              target: ["tikus", "dikejar oleh", "Kucing itu", "di dapur."] },

            // ARAS TINGGI (Campuran & Lebih panjang)
            { level: 3, type: "OBKK", aktif: "Awak perlu menyiapkan kerja sekolah itu dengan segera.",
              words: [
                  {text: "Awak", kod: "kod-subjek"}, {text: "perlu siapkan", kod: "kod-katakerja"}, 
                  {text: "kerja sekolah itu", kod: "kod-objek"}, {text: "dengan segera.", kod: "kod-keterangan"}
              ],
              target: ["kerja sekolah itu", "Awak", "perlu siapkan", "dengan segera."] },
            { level: 3, type: "OKSK", aktif: "Pihak polis telah menangkap pencuri itu pada lewat malam tadi.",
              words: [
                  {text: "Pihak polis", kod: "kod-subjek"}, {text: "telah ditangkap oleh", kod: "kod-katakerja"}, 
                  {text: "pencuri itu", kod: "kod-objek"}, {text: "pada lewat malam tadi.", kod: "kod-keterangan"}
              ],
              target: ["pencuri itu", "telah ditangkap oleh", "Pihak polis", "pada lewat malam tadi."] }
        ];

        // --- STATE MANAGEMENT ---
        const app = {
            state: {
                user: null, // { name, cls, score }
                currentScreen: 'login',
                slideIndex: 0,
                gameLevel: 1,
                qIndex: 0,
                availableWords: [],
                selectedWords: [],
                leaderboard: [],
                chatHistory: [{role: "model", text: "Hai! Saya AI KIT P-REV. Ada apa-apa soalan tentang Ayat Pasif?"}]
            },
            
            init() {
                this.render();
            },

            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
            },

            async saveToSheets(action, data) {
                if (!GOOGLE_SHEETS_URL) {
                    console.log("Mod Simulasi: Data disimpan secara maya.", action, data);
                    return; // Mock success
                }
                try {
                    const formData = new URLSearchParams();
                    formData.append('action', action);
                    formData.append('data', JSON.stringify(data));
                    
                    await fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors' // Allows sending to GAS without CORS issues (but can't read response easily)
                    });
                } catch (e) {
                    console.error("Gagal simpan ke Sheets", e);
                }
            },

            login(e) {
                e.preventDefault();
                const name = document.getElementById('studentName').value.trim();
                const cls = document.getElementById('studentClass').value.trim();
                if (name && cls) {
                    const user = { name, cls, score: 0 };
                    this.setState({ user, currentScreen: 'menu' });
                    document.getElementById('user-info').classList.remove('hidden');
                    document.getElementById('display-name').innerText = name;
                    this.saveToSheets('login', user);
                }
            },

            logout() {
                this.setState({ user: null, currentScreen: 'login', score: 0 });
                document.getElementById('user-info').classList.add('hidden');
            },

            // --- RENDERING SCREENS ---
            render() {
                const container = document.getElementById('app-container');
                container.innerHTML = ''; // Clear
                
                let screenHTML = '';
                switch(this.state.currentScreen) {
                    case 'login': screenHTML = this.renderLogin(); break;
                    case 'menu': screenHTML = this.renderMenu(); break;
                    case 'nota': screenHTML = this.renderNota(); break;
                    case 'belajar': screenHTML = this.renderBelajar(); break;
                    case 'gameMenu': screenHTML = this.renderGameMenu(); break;
                    case 'gamePlay': screenHTML = this.renderGamePlay(); break;
                    case 'leaderboard': screenHTML = this.renderLeaderboard(); break;
                    case 'sijil': screenHTML = this.renderSijil(); break;
                    case 'chat': screenHTML = this.renderChat(); break;
                }
                
                container.innerHTML = screenHTML;
                
                // Add event listeners specific to screens after render
                if(this.state.currentScreen === 'chat') {
                    const chatBox = document.getElementById('chat-box');
                    if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
                }
            },

            renderLogin() {
                return `
                    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl slide-in mt-10">
                        <div class="text-center mb-8">
                            <div class="bg-green-100 text-green-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-rocket text-4xl"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-800">Selamat Datang!</h2>
                            <p class="text-gray-500 mt-2">Log masuk untuk memulakan pengembaraan P-REV anda.</p>
                        </div>
                        <form onsubmit="app.login(event)" class="space-y-5">
                            <div>
                                <label class="block text-gray-700 font-semibold mb-2">Nama Penuh</label>
                                <input type="text" id="studentName" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-transparent transition" placeholder="Cth: Ahmad bin Ali">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-semibold mb-2">Kelas</label>
                                <input type="text" id="studentClass" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-transparent transition" placeholder="Cth: 4 Bestari">
                            </div>
                            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95">
                                Mula Belajar <i class="fa-solid fa-arrow-right ml-2"></i>
                            </button>
                        </form>
                    </div>
                `;
            },

            renderMenu() {
                const menus = [
                    { id: 'nota', title: 'Nota Padat', icon: 'fa-book-open', color: 'bg-blue-500' },
                    { id: 'belajar', title: 'Bijak Ayat Pasif', icon: 'fa-lightbulb', color: 'bg-yellow-500' },
                    { id: 'gameMenu', title: 'Latihan & Gamifikasi', icon: 'fa-gamepad', color: 'bg-purple-500' },
                    { id: 'chat', title: 'Jom Chat AI', icon: 'fa-robot', color: 'bg-indigo-500' },
                    { id: 'leaderboard', title: 'Papan Markah', icon: 'fa-trophy', color: 'bg-orange-500' },
                    { id: 'sijil', title: 'Sijil Pencapaian', icon: 'fa-certificate', color: 'bg-red-500' }
                ];

                let grid = menus.map(m => `
                    <div onclick="app.setState({currentScreen: '${m.id}'})" class="${m.color} text-white p-6 rounded-2xl shadow-lg cursor-pointer transform transition hover:-translate-y-2 hover:shadow-2xl flex flex-col items-center justify-center text-center group">
                        <i class="fa-solid ${m.icon} text-5xl mb-4 group-hover:scale-110 transition"></i>
                        <h3 class="text-xl font-bold">${m.title}</h3>
                    </div>
                `).join('');

                return `
                    <div class="max-w-4xl mx-auto slide-in">
                        <div class="text-center mb-10">
                            <h2 class="text-3xl md:text-4xl font-bold text-green-700">Pilih Aktiviti Anda, ${this.state.user.name}!</h2>
                            <p class="text-gray-600 mt-2 text-lg">Markah Terkumpul: <span class="font-bold text-green-600 bg-green-100 px-3 py-1 rounded-full">${this.state.user.score}</span></p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${grid}
                        </div>
                    </div>
                `;
            },

            renderNota() {
                const slide = notaSlides[this.state.slideIndex];
                return `
                    <div class="max-w-2xl mx-auto slide-in">
                        <button onclick="app.setState({currentScreen: 'menu'})" class="mb-4 text-gray-600 hover:text-green-600"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</button>
                        <div class="bg-white rounded-2xl shadow-xl p-8 min-h-[300px] flex flex-col justify-center text-center relative border-t-8 border-blue-500">
                            <i class="fa-solid ${slide.icon} text-6xl text-blue-200 absolute top-8 right-8 opacity-50"></i>
                            <h2 class="text-3xl font-bold text-gray-800 mb-6 z-10">${slide.title}</h2>
                            <p class="text-xl text-gray-600 leading-relaxed z-10">${slide.content}</p>
                        </div>
                        <div class="flex justify-between mt-6">
                            <button onclick="app.setState({slideIndex: Math.max(0, app.state.slideIndex - 1)})" class="bg-gray-200 px-6 py-2 rounded-lg hover:bg-gray-300 font-semibold ${this.state.slideIndex === 0 ? 'opacity-50 cursor-not-allowed' : ''}">Sebelumnya</button>
                            <span class="text-gray-500 font-bold self-center">${this.state.slideIndex + 1} / ${notaSlides.length}</span>
                            <button onclick="app.setState({slideIndex: Math.min(notaSlides.length - 1, app.state.slideIndex + 1)})" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 font-semibold ${this.state.slideIndex === notaSlides.length - 1 ? 'opacity-50 cursor-not-allowed' : ''}">Seterusnya</button>
                        </div>
                    </div>
                `;
            },

            renderBelajar() {
                return `
                    <div class="max-w-4xl mx-auto slide-in">
                        <button onclick="app.setState({currentScreen: 'menu'})" class="mb-4 text-gray-600 hover:text-green-600"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</button>
                        
                        <div class="bg-white p-6 rounded-2xl shadow-lg mb-8 border-l-8 border-yellow-400">
                            <h3 class="text-2xl font-bold mb-4">Formula 1: Kata Ganti Nama Diri 1 & 2</h3>
                            <div class="bg-gray-100 p-4 rounded-xl text-center mb-4">
                                <h4 class="text-xl font-bold text-purple-600 mb-2">Mnemonik: OH SAYA KETAWA KUAT</h4>
                                <div class="flex flex-wrap gap-2 justify-center font-bold text-lg">
                                    <span class="kod-objek px-4 py-2 rounded shadow">O (Objek)</span>
                                    <span class="kod-subjek px-4 py-2 rounded shadow">B (Pembuat)</span>
                                    <span class="kod-katakerja px-4 py-2 rounded shadow">K (Kata Kerja)</span>
                                    <span class="kod-keterangan px-4 py-2 rounded shadow">K (Keterangan)</span>
                                </div>
                            </div>
                            <p class="text-center text-gray-600 italic">Contoh: Buku itu (O) saya (B) baca (K) di perpustakaan (K).</p>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-lg border-l-8 border-green-500">
                            <h3 class="text-2xl font-bold mb-4">Formula 2: Kata Ganti Nama Diri 3</h3>
                            <div class="bg-gray-100 p-4 rounded-xl text-center mb-4">
                                <h4 class="text-xl font-bold text-indigo-600 mb-2">Mnemonik: OK SEKOLAH KAMI</h4>
                                <div class="flex flex-wrap gap-2 justify-center font-bold text-lg">
                                    <span class="kod-objek px-4 py-2 rounded shadow">O (Objek)</span>
                                    <span class="kod-katakerja px-4 py-2 rounded shadow">K (Kata Kerja)</span>
                                    <span class="kod-subjek px-4 py-2 rounded shadow">S (Subjek)</span>
                                    <span class="kod-keterangan px-4 py-2 rounded shadow">K (Keterangan)</span>
                                </div>
                            </div>
                            <p class="text-center text-gray-600 italic">Contoh: Buku itu (O) dibaca oleh (K) Ali (S) di perpustakaan (K).</p>
                        </div>
                    </div>
                `;
            },

            renderGameMenu() {
                return `
                    <div class="max-w-3xl mx-auto text-center slide-in">
                        <button onclick="app.setState({currentScreen: 'menu'})" class="mb-8 text-gray-600 hover:text-green-600 flex items-center justify-center mx-auto"><i class="fa-solid fa-arrow-left mr-2"></i> Kembali</button>
                        <h2 class="text-4xl font-bold text-purple-700 mb-8">Pilih Aras Cabaran</h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div onclick="app.startGame(1)" class="bg-green-400 text-white p-8 rounded-2xl shadow-lg cursor-pointer hover:bg-green-500 hover:scale-105 transition">
                                <i class="fa-solid fa-star text-5xl mb-4"></i>
                                <h3 class="text-2xl font-bold">Aras Rendah</h3>
                                <p class="mt-2 text-green-100">Formula OBKK</p>
                            </div>
                            <div onclick="app.startGame(2)" class="bg-yellow-400 text-black p-8 rounded-2xl shadow-lg cursor-pointer hover:bg-yellow-500 hover:scale-105 transition">
                                <i class="fa-solid fa-star-half-stroke text-5xl mb-4"></i>
                                <h3 class="text-2xl font-bold">Aras Sederhana</h3>
                                <p class="mt-2 text-yellow-900">Formula OKSK</p>
                            </div>
                            <div onclick="app.startGame(3)" class="bg-red-400 text-white p-8 rounded-2xl shadow-lg cursor-pointer hover:bg-red-500 hover:scale-105 transition">
                                <i class="fa-solid fa-fire text-5xl mb-4"></i>
                                <h3 class="text-2xl font-bold">Aras Tinggi</h3>
                                <p class="mt-2 text-red-100">Campuran & Mencabar</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            startGame(level) {
                // Filter questions by level and shuffle
                const levelQs = questions.filter(q => q.level === level);
                const q = levelQs[Math.floor(Math.random() * levelQs.length)];
                
                // Shuffle words for available list
                const shuffled = [...q.words].sort(() => Math.random() - 0.5);
                
                this.setState({
                    currentScreen: 'gamePlay',
                    gameLevel: level,
                    currentQ: q,
                    availableWords: shuffled,
                    selectedWords: []
                });
            },

            selectWord(index) {
                const word = this.state.availableWords[index];
                const newAvailable = [...this.state.availableWords];
                newAvailable.splice(index, 1);
                
                this.setState({
                    availableWords: newAvailable,
                    selectedWords: [...this.state.selectedWords, word]
                });
            },

            deselectWord(index) {
                const word = this.state.selectedWords[index];
                const newSelected = [...this.state.selectedWords];
                newSelected.splice(index, 1);
                
                this.setState({
                    selectedWords: newSelected,
                    availableWords: [...this.state.availableWords, word]
                });
            },

            checkAnswer() {
                const q = this.state.currentQ;
                const userAns = this.state.selectedWords.map(w => w.text).join(' ');
                const targetAns = q.target.join(' ');

                if (userAns === targetAns) {
                    const newScore = this.state.user.score + 10;
                    this.state.user.score = newScore;
                    this.saveToSheets('updateScore', { name: this.state.user.name, cls: this.state.user.cls, score: newScore });
                    
                    Swal.fire({
                        title: 'Tahniah!',
                        text: 'Ayat pasif yang dibina adalah TEPAT!',
                        icon: 'success',
                        confirmButtonText: 'Seterusnya'
                    }).then(() => {
                        this.startGame(this.state.gameLevel); // Load next random question from same level
                    });
                } else {
                    Swal.fire({
                        title: 'Alamak!',
                        text: 'Susunan kurang tepat. Ingat kembali formula ' + q.type + '!',
                        icon: 'error',
                        confirmButtonText: 'Cuba Lagi'
                    });
                }
            },

            renderGamePlay() {
                const q = this.state.currentQ;
                
                const availHtml = this.state.availableWords.map((w, i) => 
                    `<div onclick="app.selectWord(${i})" class="word-tile px-4 py-3 rounded-lg shadow-md font-bold text-lg ${w.kod}">${w.text}</div>`
                ).join('');

                const selHtml = this.state.selectedWords.map((w, i) => 
                    `<div onclick="app.deselectWord(${i})" class="word-tile px-4 py-3 rounded-lg shadow-md font-bold text-lg ${w.kod}">${w.text}</div>`
                ).join('');

                return `
                    <div class="max-w-4xl mx-auto slide-in">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="app.setState({currentScreen: 'gameMenu'})" class="text-gray-600 hover:text-purple-600 font-bold bg-white px-4 py-2 rounded shadow"><i class="fa-solid fa-door-open"></i> Keluar</button>
                            <div class="bg-purple-100 text-purple-800 px-4 py-2 rounded-full font-bold">Markah: ${this.state.user.score}</div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <h3 class="text-gray-500 font-bold uppercase text-sm mb-2">Tukar kepada Ayat Pasif (Formula ${q.type})</h3>
                            <p class="text-2xl font-bold text-gray-800">${q.aktif}</p>
                        </div>

                        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 min-h-[120px] border-4 border-dashed border-gray-300">
                            <p class="text-gray-400 text-sm mb-3">Susun jawapan anda di sini (Ketuk perkataan di bawah):</p>
                            <div class="flex flex-wrap gap-3">
                                ${selHtml}
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-3 mb-8 justify-center min-h-[80px]">
                            ${availHtml}
                        </div>

                        <div class="text-center">
                            <button onclick="app.checkAnswer()" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-10 rounded-full shadow-lg text-xl transform transition active:scale-95 ${this.state.availableWords.length > 0 ? 'opacity-50 cursor-not-allowed' : ''}" ${this.state.availableWords.length > 0 ? 'disabled' : ''}>
                                Semak Jawapan <i class="fa-solid fa-check ml-2"></i>
                            </button>
                        </div>
                    </div>
                `;
            },

            renderLeaderboard() {
                // Mock data if no sheets URL
                const mockLeaderboard = [
                    {name: "Ahmad", cls: "4 Bestari", score: 150},
                    {name: "Siti", cls: "5 Gigih", score: 120},
                    {name: this.state.user.name, cls: this.state.user.cls, score: this.state.user.score},
                    {name: "Muthu", cls: "6 Cerdik", score: 90}
                ].sort((a,b) => b.score - a.score);

                const rows = mockLeaderboard.map((u, i) => `
                    <tr class="border-b ${u.name === this.state.user.name ? 'bg-orange-50 font-bold' : ''}">
                        <td class="py-4 px-6 text-center">
                            ${i === 0 ? '<i class="fa-solid fa-medal text-yellow-500 text-2xl"></i>' : 
                              i === 1 ? '<i class="fa-solid fa-medal text-gray-400 text-xl"></i>' : 
                              i === 2 ? '<i class="fa-solid fa-medal text-orange-400 text-lg"></i>' : i + 1}
                        </td>
                        <td class="py-4 px-6">${u.name}</td>
                        <td class="py-4 px-6">${u.cls}</td>
                        <td class="py-4 px-6 text-orange-600 font-bold text-center">${u.score}</td>
                    </tr>
                `).join('');

                return `
                    <div class="max-w-3xl mx-auto slide-in">
                        <button onclick="app.setState({currentScreen: 'menu'})" class="mb-4 text-gray-600 hover:text-orange-600"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div class="bg-orange-500 text-white p-6 text-center">
                                <i class="fa-solid fa-trophy text-5xl mb-2"></i>
                                <h2 class="text-3xl font-bold">Papan Markah</h2>
                            </div>
                            <div class="p-0">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                                            <th class="py-3 px-6 text-center">Kedudukan</th>
                                            <th class="py-3 px-6">Nama</th>
                                            <th class="py-3 px-6">Kelas</th>
                                            <th class="py-3 px-6 text-center">Markah</th>
                                        </tr>
                                    </thead>
                                    <tbody class="text-gray-700 text-sm">
                                        ${rows}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderSijil() {
                let pencapaian = "Cemerlang";
                let pingat = "fa-medal text-yellow-500";
                if(this.state.user.score < 30) { pencapaian = "Usaha Lagi"; pingat = "fa-award text-gray-400"; }
                else if(this.state.user.score < 80) { pencapaian = "Sangat Baik"; pingat = "fa-medal text-gray-300"; }

                const dateStr = new Date().toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });

                return `
                    <div class="max-w-4xl mx-auto slide-in flex flex-col items-center">
                        <div class="w-full flex justify-between mb-4 no-print">
                            <button onclick="app.setState({currentScreen: 'menu'})" class="text-gray-600 hover:text-red-600 font-bold bg-white px-4 py-2 rounded shadow"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                            <button onclick="window.print()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded shadow"><i class="fa-solid fa-print mr-2"></i> Cetak Sijil</button>
                        </div>

                        <!-- Certificate Area -->
                        <div id="print-area" class="bg-white p-10 md:p-16 rounded-lg shadow-2xl w-full text-center border-8 border-double border-red-200 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-4 bg-red-500"></div>
                            
                            <i class="fa-solid fa-graduation-cap text-6xl text-red-500 mb-6 opacity-20 absolute top-10 right-10"></i>
                            
                            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-2 uppercase tracking-widest">Sijil Pencapaian</h1>
                            <h2 class="text-2xl text-red-600 font-bold mb-10 tracking-widest">KIT P-REV</h2>
                            
                            <p class="text-gray-600 text-lg mb-4">Dengan ini disahkan bahawa</p>
                            <h3 class="text-3xl md:text-4xl font-bold text-gray-900 border-b-2 border-gray-300 inline-block pb-2 mb-4 px-10">${this.state.user.name}</h3>
                            <p class="text-gray-600 text-lg mb-8">dari kelas <span class="font-bold text-gray-800">${this.state.user.cls}</span></p>
                            
                            <p class="text-gray-600 text-lg mb-8 max-w-2xl mx-auto leading-relaxed">
                                telah berjaya melengkapkan modul dan latihan pembinaan Ayat Pasif dengan mengumpul markah sebanyak <br>
                                <span class="text-4xl font-bold text-red-600 my-4 block">${this.state.user.score} Markah</span>
                                mencapai tahap <span class="font-bold text-gray-800 uppercase">${pencapaian}</span>.
                            </p>

                            <i class="fa-solid ${pingat} text-6xl mb-10 drop-shadow-md"></i>

                            <div class="flex justify-between items-end mt-10 max-w-xl mx-auto w-full">
                                <div class="text-center">
                                    <div class="border-b border-gray-400 w-32 mx-auto mb-2"></div>
                                    <p class="text-gray-600 text-sm">Guru Mata Pelajaran</p>
                                </div>
                                <div class="text-center">
                                    <p class="font-bold text-gray-800 mb-1">${dateStr}</p>
                                    <div class="border-b border-gray-400 w-32 mx-auto mb-2"></div>
                                    <p class="text-gray-600 text-sm">Tarikh</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderChat() {
                const msgsHtml = this.state.chatHistory.map(m => {
                    if (m.role === 'user') {
                        return `<div class="flex justify-end mb-4"><div class="bg-indigo-500 text-white p-3 rounded-l-xl rounded-br-xl max-w-[80%] shadow">${m.text}</div></div>`;
                    } else {
                        return `<div class="flex justify-start mb-4"><div class="bg-gray-200 text-gray-800 p-3 rounded-r-xl rounded-bl-xl max-w-[80%] shadow"><i class="fa-solid fa-robot mr-2 text-indigo-500"></i>${m.text}</div></div>`;
                    }
                }).join('');

                return `
                    <div class="max-w-2xl mx-auto slide-in h-[85vh] flex flex-col">
                        <button onclick="app.setState({currentScreen: 'menu'})" class="mb-4 text-gray-600 hover:text-indigo-600 self-start"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                        
                        <div class="bg-indigo-600 text-white p-4 rounded-t-2xl shadow flex items-center gap-3">
                            <i class="fa-solid fa-robot text-3xl"></i>
                            <div>
                                <h3 class="font-bold text-xl">Cikgu AI P-REV</h3>
                                <p class="text-indigo-200 text-sm">Tanya saya apa sahaja tentang Bahasa Melayu!</p>
                            </div>
                        </div>

                        <div id="chat-box" class="flex-1 bg-white p-4 overflow-y-auto shadow-inner border-x border-gray-200">
                            ${msgsHtml}
                            <div id="chat-loading" class="hidden flex justify-start mb-4">
                                <div class="bg-gray-200 text-gray-500 p-3 rounded-r-xl rounded-bl-xl shadow flex gap-1">
                                    <span class="animate-bounce">.</span><span class="animate-bounce" style="animation-delay: 0.1s">.</span><span class="animate-bounce" style="animation-delay: 0.2s">.</span>
                                </div>
                            </div>
                        </div>

                        <form onsubmit="app.sendChat(event)" class="bg-gray-100 p-4 rounded-b-2xl shadow flex gap-2">
                            <input type="text" id="chatInput" required autocomplete="off" class="flex-1 px-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:border-indigo-500" placeholder="Menaip mesej...">
                            <button type="submit" class="bg-indigo-500 hover:bg-indigo-600 text-white rounded-full w-12 h-12 flex items-center justify-center transform transition active:scale-95 shadow">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                `;
            },

            async sendChat(e) {
                e.preventDefault();
                const inputEl = document.getElementById('chatInput');
                const text = inputEl.value.trim();
                if(!text) return;

                // Add user msg
                const newHistory = [...this.state.chatHistory, {role: 'user', text}];
                this.setState({ chatHistory: newHistory });
                
                inputEl.value = '';
                document.getElementById('chat-loading').classList.remove('hidden');
                
                // Call Gemini API
                try {
                    const prompt = `Sebagai seorang guru Bahasa Melayu yang mesra, jawab soalan pelajar bernama ${this.state.user.name} ini secara ringkas (maksimum 3 ayat). Soalan: ${text}`;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are a friendly Malay language teacher. Always respond in Malay. Keep it short and encouraging." }] }
                        })
                    });
                    
                    const data = await response.json();
                    let aiText = "Maaf, cikgu AI sedang berehat sebentar.";
                    if(data.candidates && data.candidates[0] && data.candidates[0].content) {
                        aiText = data.candidates[0].content.parts[0].text;
                    }
                    
                    this.setState({ chatHistory: [...newHistory, {role: 'model', text: aiText}] });
                } catch(err) {
                    console.error("AI Error:", err);
                    this.setState({ chatHistory: [...newHistory, {role: 'model', text: "Maaf, sistem AI sedang offline."}] });
                }
            }
        };

        // Initialize App
        // Tambahan SweetAlert2 untuk Popup yang cantik
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/sweetalert2@11";
        script.onload = () => app.init();
        document.head.appendChild(script);
        
    </script>
</body>
</html>
